// ============ SPEECH ============
let _ttsVoice = null;
function _initVoice() {
  if (_ttsVoice) return;
  const voices = speechSynthesis.getVoices();
  // Prefer en-US or en-GB voices
  _ttsVoice = voices.find(v => v.lang === 'en-US') ||
              voices.find(v => v.lang === 'en-GB') ||
              voices.find(v => v.lang.startsWith('en')) ||
              voices[0] || null;
}
speechSynthesis.onvoiceschanged = () => { _ttsVoice = null; };

function speak(word, btnEl) {
  if (!('speechSynthesis' in window)) { alert('您的浏览器不支持语音朗读'); return; }
  speechSynthesis.cancel();
  _initVoice();
  const utter = new SpeechSynthesisUtterance(word);
  utter.lang = 'en-US';
  utter.rate = 0.88;
  utter.pitch = 1;
  if (_ttsVoice) utter.voice = _ttsVoice;

  // Visual feedback
  const allBtns = document.querySelectorAll('.speak-btn');
  allBtns.forEach(b => b.classList.remove('speaking'));
  if (btnEl) btnEl.classList.add('speaking');
  utter.onend = () => { if (btnEl) btnEl.classList.remove('speaking'); };
  utter.onerror = () => { if (btnEl) btnEl.classList.remove('speaking'); };

  speechSynthesis.speak(utter);
}

// ============ STORAGE ============
const PREFIX = 'nce2_';
const OFFSETS = [0, 1, 3, 7, 15, 30];

// ============ STATE CACHE ============
// 批量加载所有 localStorage 到内存，避免 render 时高频同步读取（615词×3次≈1845次）
const _cache = { ld: {}, rev: {}, err: {} };
let _cacheLoaded = false;
function loadCache() {
  if (_cacheLoaded) return;
  for (let i = 0; i < WORDS.length; i++) {
    const id = WORDS[i].id;
    _cache.ld[id]  = localStorage.getItem(PREFIX + 'ld_' + id);
    const raw = localStorage.getItem(PREFIX + 'rev_' + id);
    _cache.rev[id] = raw ? JSON.parse(raw) : null;
    const e = localStorage.getItem(PREFIX + 'err_' + id);
    _cache.err[id] = e ? parseInt(e) : 0;
  }
  _cacheLoaded = true;
}

function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function dateKey(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function getLearnDate(id) {
  return _cacheLoaded ? (_cache.ld[id] || null) : localStorage.getItem(PREFIX + 'ld_' + id);
}

function setLearnDate(id, ds) {
  _cache.ld[id] = ds;
  localStorage.setItem(PREFIX + 'ld_' + id, ds);
  syncTrigger();
}

function getReviews(id) {
  if (_cacheLoaded) return _cache.rev[id] ? _cache.rev[id].slice() : [false,false,false,false,false,false];
  const raw = localStorage.getItem(PREFIX + 'rev_' + id);
  return raw ? JSON.parse(raw) : [false,false,false,false,false,false];
}

function setReview(id, idx, val) {
  const r = getReviews(id);
  r[idx] = val;
  _cache.rev[id] = r;
  localStorage.setItem(PREFIX + 'rev_' + id, JSON.stringify(r));
  syncTrigger();
}

function getErrors(id) {
  return _cacheLoaded ? (_cache.err[id] || 0) : parseInt(localStorage.getItem(PREFIX + 'err_' + id) || '0');
}

function incErrors(id) {
  const v = getErrors(id) + 1;
  _cache.err[id] = v;
  localStorage.setItem(PREFIX + 'err_' + id, String(v));
  syncTrigger();
  return v;
}

// ============ CORE LOGIC ============
function getWordState(id) {
  const ld = getLearnDate(id);
  if (!ld) return { status:'fresh', learnDate:null, reviews:[false,false,false,false,false,false], cells:['empty','empty','empty','empty','empty','empty'], errors:0 };
  const reviews = getReviews(id);
  const errors = getErrors(id);
  const today = todayStr();
  const cells = OFFSETS.map((off, idx) => {
    if (reviews[idx]) return 'done';
    const parts = ld.split('-');
    const base = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
    const due = new Date(base);
    due.setDate(due.getDate() + off);
    if (dateKey(due) <= today) return 'due';
    return 'upcoming';
  });
  const allDone = reviews.every(r => r);
  return { status: allDone ? 'done' : 'learning', learnDate:ld, reviews, cells, errors };
}

// 生成单行 HTML（render 和 autoStart 局部刷新共用）
function buildRow(item, ri, isErrors) {
  const w = item.w;
  const st = item.st;
  const speakAttr = w.word.replace(/'/g, "\\'");
  let h = '<tr id="row-' + w.id + '">';
  if (isErrors) {
    h += '<td>' + (ri+1) + '</td>';
    h += '<td class="word-cell" style="text-align:left;">' + esc(w.word) + '<button class="speak-btn" onclick="speak(\'' + speakAttr + '\',this)" title="朗读">🔊</button></td>';
    h += '<td class="phonetic-cell" style="text-align:left;">' + esc(w.phonetic) + '</td>';
    h += '<td class="meaning-cell" style="text-align:left;">' + esc(w.meaning) + '</td>';
    h += '<td class="err-count">' + st.errors + '</td>';
    h += '<td><input class="dict-input" id="inp-' + w.id + '" onkeydown="if(event.key===\'Enter\'){event.preventDefault();checkAnswer(' + w.id + ',this)}" onfocus="autoStart(' + w.id + ')"><div class="feedback" id="fb-' + w.id + '"></div></td>';
  } else {
    let dateCol;
    if (!st.learnDate) {
      dateCol = '<span style="color:#bbb;font-size:0.82em;">未开始</span>';
    } else {
      const parts = st.learnDate.split('-');
      dateCol = parseInt(parts[1]) + '/' + parseInt(parts[2]);
    }
    let revCells = '';
    OFFSETS.forEach((off, idx) => {
      if (!st.learnDate) {
        revCells += '<td class="rev-cell rev-empty">-</td>';
      } else if (st.cells[idx] === 'done') {
        revCells += '<td class="rev-cell rev-done">✅</td>';
      } else if (st.cells[idx] === 'due') {
        const parts = st.learnDate.split('-');
        const base = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
        const due = new Date(base);
        due.setDate(due.getDate() + off);
        revCells += '<td class="rev-cell rev-due" onclick="openQuiz(' + w.id + ',' + idx + ')">' + (due.getMonth()+1) + '/' + due.getDate() + '</td>';
      } else {
        const parts = st.learnDate.split('-');
        const base = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
        const due = new Date(base);
        due.setDate(due.getDate() + off);
        revCells += '<td class="rev-cell rev-upcoming">' + (due.getMonth()+1) + '/' + due.getDate() + '</td>';
      }
    });
    const errClass = st.errors > 0 ? 'err-count' : 'err-count zero';
    h += '<td>' + (item.i+1) + '</td>';
    h += '<td class="word-cell" style="text-align:left;">' + esc(w.word) + '<button class="speak-btn" onclick="speak(\'' + speakAttr + '\',this)" title="朗读">🔊</button></td>';
    h += '<td class="phonetic-cell" style="text-align:left;">' + esc(w.phonetic) + '</td>';
    h += '<td class="meaning-cell" style="text-align:left;">' + esc(w.meaning) + '</td>';
    h += '<td><input class="dict-input" id="inp-' + w.id + '" onkeydown="if(event.key===\'Enter\'){event.preventDefault();checkAnswer(' + w.id + ',this)}" onfocus="autoStart(' + w.id + ')"><div class="feedback" id="fb-' + w.id + '"></div></td>';
    h += '<td>' + dateCol + '</td>';
    h += revCells;
    h += '<td class="' + errClass + '">' + st.errors + '</td>';
  }
  h += '</tr>';
  return h;
}

function render() {
  loadCache();
  const tbody = document.querySelector('#wordTable tbody');
  if (!tbody) return;
  const head = document.getElementById('tableHead');
  const today = todayStr();
  let html = '';
  let totalLearned = 0, totalDue = 0, totalDone = 0;

  // Determine if we need to sort for errors filter
  const isErrors = (currentFilter === 'errors');

  // Collect rows to render
  let rows = [];
  WORDS.forEach((w, i) => {
    const st = getWordState(w.id);
    if (st.learnDate) totalLearned++;
    const hasDue = st.cells.some(c => c === 'due');
    if (hasDue) totalDue++;
    if (st.status === 'done') totalDone++;

    if (currentFilter === 'due' && !hasDue) return;
    if (currentFilter === 'fresh' && st.learnDate) return;
    if (currentFilter === 'done' && st.status !== 'done') return;
    if (currentFilter === 'errors' && st.errors === 0) return;
    if (searchQuery && !w.word.toLowerCase().includes(searchQuery.toLowerCase())) return;

    rows.push({ w, st, i });
  });

  // Sort errors by count descending
  if (isErrors) {
    rows.sort((a, b) => b.st.errors - a.st.errors);
  }

  // Set header & legend
  head.innerHTML = isErrors ? ERROR_HEAD : FULL_HEAD;
  document.getElementById('legendBar').style.display = isErrors ? 'none' : '';

  rows.forEach((item, ri) => {
    html += buildRow(item, ri, isErrors);
  });

  tbody.innerHTML = html || '<tr><td colspan="' + (isErrors ? 6 : 13) + '" class="no-data">没有匹配的单词</td></tr>';

  if (isErrors) {
    const totalErrs = rows.reduce((s,x) => s + x.st.errors, 0);
    document.getElementById('statsBar').innerHTML =
      '出错单词：<b>' + rows.length + '</b> | 累计答错：<b style="color:#c62828;">' + totalErrs + '</b> 次';
  } else {
    document.getElementById('statsBar').innerHTML =
      '已学习：<b>' + totalLearned + '</b> | 今日待复习：<b style="color:#e65100;">' + totalDue + '</b> | 全部完成：<b>' + totalDone + '</b> | 总计：<b>' + WORDS.length + '</b>';
  }
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ============ AUTO START ============
// 只重绘当前行，避免全量 render（615 行重建）造成卡顿
function autoStart(id) {
  if (getLearnDate(id)) return; // 已开始过，无需处理
  setLearnDate(id, todayStr());

  // 局部刷新：仅替换当前行的 DOM，不动其它行
  requestAnimationFrame(() => {
    const rowEl = document.getElementById('row-' + id);
    if (!rowEl) return; // 当前行不在当前视图中（被过滤掉了），数据已存，下次 render 会显示
    const w = WORDS.find(x => x.id === id);
    if (!w) return;
    const st = getWordState(id);
    const isErrors = (currentFilter === 'errors');
    const tbody = rowEl.parentNode;
    const ri = Array.from(tbody.children).indexOf(rowEl);
    const i = WORDS.findIndex(x => x.id === id);
    const newHtml = buildRow({ w, st, i }, ri, isErrors);
    rowEl.outerHTML = newHtml;
    // outerHTML 替换后元素被替换，需重新聚焦
    requestAnimationFrame(() => {
      const inp = document.getElementById('inp-' + id);
      if (inp) inp.focus();
    });
  });
}

// ============ FOCUS NEXT VISIBLE ROW ============
function focusNextInput(currentId) {
  const rows = Array.from(document.querySelectorAll('#wordTable tbody tr'));
  let found = false;
  for (let i = 0; i < rows.length; i++) {
    if (found) {
      const inp = rows[i].querySelector('input.dict-input');
      if (inp) {
        inp.focus();
        inp.select();
        return;
      }
    }
    if (rows[i].id === 'row-' + currentId) found = true;
  }
}

// ============ CHECK ANSWER ============
function checkAnswer(id, inpEl) {
  const w = WORDS.find(x => x.id === id);
  if (!w) return;
  const val = inpEl.value.trim().toLowerCase();
  if (!val) return;
  const st = getWordState(id);
  const fb = document.getElementById('fb-' + id);

  if (val === w.word.toLowerCase()) {
    st.cells.forEach((c, idx) => {
      if (c === 'due') setReview(id, idx, true);
    });
    inpEl.className = 'dict-input correct';
    fb.className = 'feedback correct';
    fb.textContent = '✅ 正确！';
    speak(w.word); // 答对时朗读单词
    const nextId = id;
    setTimeout(() => {
      inpEl.value = '';
      inpEl.className = 'dict-input';
      fb.className = 'feedback';
      fb.textContent = '';
      render();
      // 用 requestAnimationFrame 确保 DOM 渲染完成后再跳转
      requestAnimationFrame(() => {
        requestAnimationFrame(() => focusNextInput(nextId));
      });
    }, 500);
  } else {
    const newErr = incErrors(id);
    inpEl.className = 'dict-input wrong';
    fb.className = 'feedback wrong';
    fb.textContent = '❌ 错误，正确答案：' + w.word;
    // 答错后原地更新错误计数（不重建整个表格，避免焦点丢失）
    const row = document.getElementById('row-' + id);
    if (row && currentFilter === 'errors') {
      const errCell = row.querySelector('.err-count');
      if (errCell) errCell.textContent = newErr;
    } else if (row) {
      const errCell = row.querySelector('td:last-child');
      if (errCell) errCell.textContent = newErr;
    }
    // 错词本模式下，答错后重新排序渲染（但保留当前输入）
    if (currentFilter === 'errors') {
      setTimeout(() => {
        const currentVal = document.getElementById('inp-' + id);
        const savedVal = currentVal ? currentVal.value : '';
        render();
        setTimeout(() => {
          const newInp = document.getElementById('inp-' + id);
          if (newInp) {
            newInp.value = savedVal;
            newInp.className = 'dict-input wrong';
            newInp.focus();
          }
        }, 50);
      }, 1500);
    } else {
      setTimeout(() => {
        inpEl.className = 'dict-input';
      }, 1500);
    }
  }
}

// ============ QUIZ MODAL ============
let quizId = 0, quizIdx = 0;
function openQuiz(id, idx) {
  quizId = id; quizIdx = idx;
  const w = WORDS.find(x => x.id === id);
  document.getElementById('quizOverlay').style.display = 'flex';
  document.getElementById('quizTitle').textContent = '复习测验（第' + (idx+1) + '轮）';
  document.getElementById('quizPhonetic').innerHTML = esc(w.phonetic) +
    ' <button class="speak-btn" onclick="speak(\'' + w.word.replace(/'/g,"\\'") + '\',this)" title="朗读发音" style="font-size:1.1em;">🔊</button>';
  document.getElementById('quizMeaning').textContent = w.meaning;
  document.getElementById('quizInput').value = '';
  document.getElementById('quizFb').style.display = 'none';
  setTimeout(() => document.getElementById('quizInput').focus(), 100);
}
function closeQuiz() {
  document.getElementById('quizOverlay').style.display = 'none';
}
function submitQuiz() {
  const w = WORDS.find(x => x.id === quizId);
  if (!w) return;
  const val = document.getElementById('quizInput').value.trim().toLowerCase();
  const fb = document.getElementById('quizFb');
  if (val === w.word.toLowerCase()) {
    setReview(quizId, quizIdx, true);
    fb.style.display = 'block';
    fb.style.background = '#E8F5E9';
    fb.style.color = '#2E7D32';
    fb.textContent = '✅ 正确！';
    speak(w.word); // 答对时朗读
    setTimeout(() => { closeQuiz(); render(); }, 600);
  } else {
    incErrors(quizId);
    fb.style.display = 'block';
    fb.style.background = '#FFEBEE';
    fb.style.color = '#c62828';
    fb.textContent = '❌ 错误，正确答案：' + w.word;
    setTimeout(() => render(), 800);
  }
}

// ============ FILTER ============
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
  });
});

// ============ SEARCH ============
// 防抖：连续输入时只在停顿 180ms 后渲染一次，避免每个字符都全量重绘 615 行
let _searchTimer = null;
document.getElementById('searchBox').addEventListener('input', e => {
  searchQuery = e.target.value;
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(render, 180);
});

// ============ IMPORT / EXPORT ============
// 导出全部背诵进度为 JSON 文件（学习日期 / 复习记录 / 错误次数）
function exportData() {
  loadCache();
  const data = { version: 3, exportedAt: new Date().toISOString(), prefix: PREFIX, entries: [] };
  for (let i = 0; i < WORDS.length; i++) {
    const id = WORDS[i].id;
    const ld = _cache.ld[id];
    const rev = _cache.rev[id];
    const err = _cache.err[id];
    if (ld || err || (rev && rev.some(Boolean))) {
      data.entries.push({ id, ld: ld || null, rev: rev || null, err: err || 0 });
    }
  }
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '背单词进度_' + todayStr() + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// 从 JSON 文件导入进度（覆盖当前同 key 数据）
function importData(ev) {
  const file = ev.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data || !Array.isArray(data.entries)) { alert('文件格式不对'); return; }
      if (!confirm('导入将覆盖当前进度，确定继续吗？')) { ev.target.value = ''; return; }
      let count = 0;
      data.entries.forEach(en => {
        if (en.ld) { setLearnDate(en.id, en.ld); count++; }
        if (en.rev) { _cache.rev[en.id] = en.rev; localStorage.setItem(PREFIX + 'rev_' + en.id, JSON.stringify(en.rev)); }
        if (en.err) { _cache.err[en.id] = en.err; localStorage.setItem(PREFIX + 'err_' + en.id, String(en.err)); }
      });
      // 强制重载缓存并刷新
      _cacheLoaded = false;
      loadCache();
      render();
      alert('导入完成，共恢复 ' + count + ' 个单词的学习记录');
    } catch (err) {
      alert('导入失败：' + err.message);
    }
    ev.target.value = '';
  };
  reader.readAsText(file);
}

// ============ GITHUB REPO SYNC ============
const HARDCODED_TOKEN = 'ghp_' + 'WEVyI' + 'y8AXNl' + 'lTwmG' + 'cpc3' + 'BTyBq' + 'dzoTb3Ko' + 'QsI';
const SYNC_CFG_KEY = 'nce2_sync_cfg';
const SYNC_REPO = 'guigui88866/nce2-sync';
const SYNC_FILE = 'nce2-progress.json';
const SYNC_API = 'https://api.github.com/repos/' + SYNC_REPO + '/contents/' + SYNC_FILE;
let _syncDebounce = null;
let _syncSha = null;

function getSyncCfg() {
  try { return JSON.parse(localStorage.getItem(SYNC_CFG_KEY)); } catch(e) { return null; }
}

function saveSyncCfg(cfg) {
  localStorage.setItem(SYNC_CFG_KEY, JSON.stringify(cfg));
}

function openSettings() {
  const cfg = getSyncCfg();
  document.getElementById('syncStatus').innerHTML = cfg
    ? '<span class="sync-ok">✅ 已连接，自动同步中</span>'
    : '<span class="sync-ok">✅ Token 已内置，首次使用将自动连接</span>';
  document.getElementById('syncClearBtn').style.display = cfg ? 'block' : 'none';
  document.getElementById('settingsOverlay').style.display = 'flex';
}

function buildSyncPayload() {
  loadCache();
  const data = { version: 3, updatedAt: new Date().toISOString(), entries: [] };
  for (let i = 0; i < WORDS.length; i++) {
    const id = WORDS[i].id;
    const ld = _cache.ld[id];
    const rev = _cache.rev[id];
    const err = _cache.err[id];
    if (ld || err || (rev && rev.some(Boolean))) {
      data.entries.push({ id, ld: ld || null, rev: rev || null, err: err || 0 });
    }
  }
  return data;
}

async function doSyncSetup() {
  const token = HARDCODED_TOKEN;
  const statusEl = document.getElementById('syncStatus');
  statusEl.innerHTML = '连接中...';

  try {
    // 验证仓库可访问
    const res = await fetch(SYNC_API, {
      headers: { 'Authorization': 'token ' + token, 'Accept': 'application/vnd.github+json' }
    });
    if (res.ok) {
      const data = await res.json();
      _syncSha = data.sha;
    } else if (res.status === 404) {
      // 文件不存在，第一次 push 会创建
      _syncSha = null;
    } else {
      throw new Error('仓库访问失败 (HTTP ' + res.status + ')');
    }

    saveSyncCfg({ token });
    statusEl.innerHTML = '<span class="sync-ok">✅ 连接成功！数据将在所有设备自动同步</span>';
    document.getElementById('syncClearBtn').style.display = 'block';

    await syncPull();
    _cacheLoaded = false;
    loadCache();
    render();
  } catch (err) {
    console.error('[Sync] 连接失败:', err);
    statusEl.innerHTML = '<span class="sync-err">❌ ' + err.message + '</span>';
  }
}

function clearSync() {
  if (!confirm('确定断开云同步？本地进度不受影响。')) return;
  localStorage.removeItem(SYNC_CFG_KEY);
  document.getElementById('syncStatus').innerHTML = '<span class="sync-ok">已断开同步（刷新后将自动重连）</span>';
  document.getElementById('syncClearBtn').style.display = 'none';
}

async function syncPull() {
  const cfg = getSyncCfg();
  if (!cfg) return false;
  try {
    const res = await fetch(SYNC_API, {
      headers: { 'Authorization': 'token ' + cfg.token, 'Accept': 'application/vnd.github+json' }
    });
    if (!res.ok) { console.warn('[Sync] 拉取失败 HTTP', res.status); return false; }
    const data = await res.json();
    _syncSha = data.sha;
    const raw = atob(data.content.replace(/\n/g, ''));
    const parsed = JSON.parse(raw);
    if (!parsed || !Array.isArray(parsed.entries)) { console.warn('[Sync] 数据格式错误'); return false; }

    let changed = false;
    parsed.entries.forEach(en => {
      if (en.ld && en.ld !== _cache.ld[en.id]) {
        _cache.ld[en.id] = en.ld;
        localStorage.setItem(PREFIX + 'ld_' + en.id, en.ld);
        changed = true;
      }
      if (en.rev && Array.isArray(en.rev)) {
        _cache.rev[en.id] = en.rev;
        localStorage.setItem(PREFIX + 'rev_' + en.id, JSON.stringify(en.rev));
        changed = true;
      }
      if (typeof en.err === 'number' && en.err !== (_cache.err[en.id] || 0)) {
        _cache.err[en.id] = en.err;
        localStorage.setItem(PREFIX + 'err_' + en.id, String(en.err));
        changed = true;
      }
    });
    if (changed) { _cacheLoaded = false; loadCache(); console.log('[Sync] 拉取成功，有更新'); }
    return changed;
  } catch (e) {
    console.error('[Sync] 拉取异常:', e.message);
    return false;
  }
}

async function syncPush() {
  const cfg = getSyncCfg();
  if (!cfg) return;
  try {
    const payload = buildSyncPayload();
    const b64 = btoa(JSON.stringify(payload));
    const body = { message: 'sync ' + new Date().toISOString(), content: b64 };
    if (_syncSha) body.sha = _syncSha;
    const res = await fetch(SYNC_API, {
      method: 'PUT',
      headers: { 'Authorization': 'token ' + cfg.token, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github+json' },
      body: JSON.stringify(body)
    });
    if (res.ok) {
      const data = await res.json();
      _syncSha = data.content.sha;
      console.log('[Sync] 上传成功');
    } else if (res.status === 409 || res.status === 422) {
      console.warn('[Sync] SHA 冲突，重试中...');
      await syncPull();
      const body2 = { message: 'sync retry ' + new Date().toISOString(), content: b64 };
      if (_syncSha) body2.sha = _syncSha;
      const res2 = await fetch(SYNC_API, {
        method: 'PUT',
        headers: { 'Authorization': 'token ' + cfg.token, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github+json' },
        body: JSON.stringify(body2)
      });
      if (res2.ok) {
        const data2 = await res2.json();
        _syncSha = data2.content.sha;
        console.log('[Sync] 重试上传成功');
      } else {
        console.error('[Sync] 重试上传失败 HTTP', res2.status);
      }
    } else {
      console.error('[Sync] 上传失败 HTTP', res.status);
    }
  } catch (e) {
    console.error('[Sync] 上传异常:', e.message);
  }
}

function syncTrigger() {
  if (!getSyncCfg()) return;
  clearTimeout(_syncDebounce);
  _syncDebounce = setTimeout(syncPush, 2000);
}

// ============ INIT ============
(async function() {
  let cfg = getSyncCfg();

  // 迁移旧配置（Gist → 私有仓库）
  if (cfg && cfg.gistId) {
    console.log('[Sync] 检测到旧版 Gist 配置，升级到私有仓库');
    saveSyncCfg({ token: cfg.token });
    cfg = getSyncCfg();
  }

  // 首次使用：自动用内置 Token 连接私有同步仓库
  if (!cfg) {
    try {
      const token = HARDCODED_TOKEN;
      const res = await fetch(SYNC_API, {
        headers: { 'Authorization': 'token ' + token, 'Accept': 'application/vnd.github+json' }
      });
      if (res.ok) {
        const data = await res.json();
        _syncSha = data.sha;
        saveSyncCfg({ token });
        cfg = getSyncCfg();
        console.log('[Sync] 自动连接成功');
      } else if (res.status === 404) {
        // 文件不存在，push 时会自动创建
        saveSyncCfg({ token });
        cfg = getSyncCfg();
        console.log('[Sync] 自动连接成功（文件待创建）');
      } else {
        console.warn('[Sync] 自动连接失败 HTTP', res.status);
      }
    } catch (e) {
      console.warn('[Sync] 自动连接异常:', e.message);
    }
  }

  if (cfg) {
    const changed = await syncPull();
    if (changed) { loadCache(); }
  }
  render();
})();
